<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — SiteButcher</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0b;--ink:#e8e8ea;--ink-dim:#9b9ba6;--ink-faint:#5a5a64;--line:#26262d;--accent:#10b981;--accent-dim:#0d9668;--mono:"JetBrains Mono",monospace;--sans:"Inter",system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  .mark{width:46px;height:46px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:grid;place-items:center;color:#04231a;font-size:24px;margin:0 auto 28px}
  .code{font-family:var(--mono);font-size:clamp(60px,14vw,120px);font-weight:700;color:var(--accent);letter-spacing:-.04em;line-height:1}
  h1{font-size:clamp(22px,4vw,30px);font-weight:800;margin:14px 0 12px;letter-spacing:-.02em}
  p{color:var(--ink-dim);max-width:42ch;margin:0 auto 30px;font-size:16px}
  .btn{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:600;padding:11px 20px;border-radius:8px;text-decoration:none;background:var(--accent);color:#04231a;transition:transform .12s}
  .btn:hover{transform:translateY(-1px)}
  .hint{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-top:26px}
</style>
</head>
<body>
  <main>
    <div class="mark">🪓</div>
    <div class="code">404</div>
    <h1>This page got chopped.</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back to safety.</p>
    <a href="/" class="btn">← Back to home</a>
    <div class="hint">// sitebutcher.com</div>
  </main>
</body>
</html>
